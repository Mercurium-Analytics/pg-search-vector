# pg-search-vector — baseline Postgres tuning.
#
# Overlaid on Postgres defaults. Values here assume a dedicated DB container
# (shared_buffers = 25% of container RAM). Individual values can be overridden
# via environment variables at entrypoint time — see entrypoint.sh.

# ── Concurrency ──
max_connections = 200

# ── Extensions that need preload ──
# Full list lives here (at build time) so that initdb-time CREATE EXTENSION
# for pgaudit / pg_wait_sampling / pg_prewarm succeeds on a fresh volume.
# Order note: pg_cron must appear first.
shared_preload_libraries = 'pg_cron,pg_search,pg_stat_statements,pg_prewarm,pg_wait_sampling,pgaudit,auto_explain'

# pg_cron: which DB holds cron metadata (pg_cron.job, pg_cron.job_run_details).
# Scheduled jobs can target ANY database via SELECT cron.schedule_in_database(...).
# Override via PGSV_CRON_DATABASE env var at first init.
cron.database_name = 'postgres'

# ── WAL + checkpoints (write safety with reasonable throughput) ──
checkpoint_timeout           = 15min
max_wal_size                 = 4GB
min_wal_size                 = 512MB
checkpoint_completion_target = 0.9
wal_compression              = zstd

# ── Planner (SSD/NVMe-era defaults) ──
random_page_cost         = 1.1
effective_io_concurrency = 200

# ── Parallelism ──
max_parallel_workers             = 8
max_parallel_workers_per_gather  = 4
max_parallel_maintenance_workers = 4

# ── Logging & observability ──
log_min_duration_statement = 500          # log anything slower than 500ms
log_checkpoints            = on
log_lock_waits             = on
log_autovacuum_min_duration = 1s

# auto_explain (preloaded)
auto_explain.log_min_duration = 1000      # >1s
auto_explain.log_analyze      = on
auto_explain.log_buffers      = on
auto_explain.log_format       = text

# pg_stat_statements
pg_stat_statements.max   = 10000
pg_stat_statements.track = all

# ── pg_search memtable budget (raisable via env) ──
pg_search.memory_limit = 512MB
