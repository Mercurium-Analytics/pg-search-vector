services:
  db:
    image: ghcr.io/mercurium-analytics/pg-search-vector:pg17-pooled
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_APP_USER: app
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:?set POSTGRES_APP_PASSWORD}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: "20"
      PGBOUNCER_MAX_CLIENT_CONN: "500"
    ports:
      - "5432:5432"     # direct postgres (migrations, admin)
      - "6432:6432"     # pgbouncer (app)
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "127.0.0.1", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
