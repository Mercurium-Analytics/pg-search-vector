name: pg-search-vector-skills
description: >
  Opinionated skills for the pg_search (ParadeDB BM25) + pgvector +
  pgvectorscale + pg_repack + pg_partman + pg_cron + PgBouncer stack,
  with Django and FastAPI integration patterns. Pairs with pg-aiguide
  for general Postgres advice.
version: 0.1.0
license: MIT
homepage: https://github.com/Mercurium-Analytics/pg-search-vector
type: local_collection
path: .

# To bundle with pg-aiguide's general-Postgres skills, install both:
#   npx skills add timescale/pg-aiguide --skill postgres
#   npx skills add Mercurium-Analytics/pg-search-vector --skill pgsv
#
# Each upstream keeps its own license and attribution.

related:
  - source: timescale/pg-aiguide
    license: Apache-2.0
    rationale: >
      General Postgres schema-design, indexing, and performance skills.
      Complementary — we focus on the pg_search/pgvector/scale extensions
      stack and app-framework patterns; pg-aiguide covers PG core.
